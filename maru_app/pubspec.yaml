name: maru_app
description: "Maru - 현장 작업자를 위한 완벽한 공수 달력"
publish_to: 'none'
version: 1.0.0+1 

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  flutter_riverpod: ^2.5.1
  get: ^4.6.6
  hive_flutter: ^1.1.0
  intl: ^0.20.2
  table_calendar: ^3.1.2
  image_picker: ^1.1.2
  url_launcher: ^6.3.0
  fl_chart: ^0.68.0
  path_provider: ^2.1.3
  share_plus: ^9.0.0
  file_picker: ^8.0.0
  open_filex: ^4.5.2
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.2
  screenshot: ^3.0.0
  gal: ^2.3.0 
  pdf: ^3.10.7      
  printing: ^5.13.0
  
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  cloud_firestore: ^4.13.6
  google_sign_in: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  hive_generator: ^2.0.1
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true

  fonts:
    - family: NanumGothic
      fonts:
        - asset: assets/fonts/NanumGothic-Regular.ttf
        - asset: assets/fonts/NanumGothic-Bold.ttf
          weight: 700

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/Maru_ium.png"

flutter_native_splash:
  color: "#FE3939"
  image: "assets/Maru_ium.png"
  android_12:
    image: "assets/Maru_ium.png"
    color: "#FE3939"